<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Combustível Flex</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white shadow-xl rounded-2xl p-6 w-full max-w-md border border-slate-100">
        <div class="text-center mb-6">
            <div class="inline-flex p-3 bg-indigo-50 text-indigo-600 rounded-full mb-2">
                <i class="fa-solid fa-gas-pump text-2xl"></i>
            </div>
            <h1 class="text-xl font-bold text-slate-900">Calculadora Flex</h1>
            <p class="text-sm text-slate-500">Calcule consumo e custos, mesmo com tanque misto.</p>
        </div>

        <form id="calcForm" class="space-y-5" onsubmit="calcular(event)">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Distância Percorrida (km)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-route"></i>
                    </div>
                    <input type="number" id="distancia" step="0.1" required placeholder="Ex: 350.5" 
                        class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
                </div>
            </div>

            <hr class="border-slate-100">

            <div class="bg-amber-50/50 p-4 rounded-xl border border-amber-100/70 space-y-3">
                <div class="flex items-center gap-2 text-amber-700 font-bold text-sm">
                    <i class="fa-solid fa-droplet text-amber-600"></i> Gasolina
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Preço por Litro (R$)</label>
                        <input type="number" id="precoGasolina" step="0.01" placeholder="0,00"
                            class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Litros Abastecidos</label>
                        <input type="number" id="litrosGasolina" step="0.01" placeholder="0.00"
                            class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="bg-emerald-50/50 p-4 rounded-xl border border-emerald-100/70 space-y-3">
                <div class="flex items-center gap-2 text-emerald-700 font-bold text-sm">
                    <i class="fa-solid fa-leaf text-emerald-600"></i> Etanol
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Preço por Litro (R$)</label>
                        <input type="number" id="precoEtanol" step="0.01" placeholder="0,00"
                            class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-600 mb-1">Litros Abastecidos</label>
                        <input type="number" id="litrosEtanol" step="0.01" placeholder="0.00"
                            class="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition shadow-lg shadow-indigo-100 cursor-pointer">
                Calcular Resultados
            </button>
        </form>

        <div id="resultados" class="mt-6 hidden pt-6 border-t border-slate-100 space-y-4 animate-fade-in">
            <h3 class="font-bold text-slate-900 text-base">Resumo do Abastecimento</h3>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                    <span class="block text-xs text-slate-500 font-medium">Gasto Total</span>
                    <span id="resGastoTotal" class="text-lg font-bold text-slate-900">R$ 0,00</span>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                    <span class="block text-xs text-slate-500 font-medium">Consumo Médio</span>
                    <span id="resConsumo" class="text-lg font-bold text-indigo-600">0,00 km/L</span>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                    <span class="block text-xs text-slate-500 font-medium">Custo por km</span>
                    <span id="resCustoKm" class="text-sm font-semibold text-slate-800">R$ 0,00 / km</span>
                </div>
                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 text-center">
                    <span class="block text-xs text-slate-500 font-medium">Total de Litros</span>
                    <span id="resTotalLitros" class="text-sm font-semibold text-slate-800">0,00 L</span>
                </div>
            </div>

            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 space-y-2">
                <span class="block text-xs text-slate-500 font-medium text-center">Proporção do Abastecimento</span>
                <div class="w-full bg-slate-200 rounded-full h-2.5 flex overflow-hidden">
                    <div id="barraGasolina" class="bg-amber-500 h-full transition-all duration-500" style="width: 50%"></div>
                    <div id="barraEtanol" class="bg-emerald-500 h-full transition-all duration-500" style="width: 50%"></div>
                </div>
                <div class="flex justify-between text-[11px] font-medium text-slate-500">
                    <span id="pctGasolina">Gasolina: 0%</span>
                    <span id="pctEtanol">Etanol: 0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcular(event) {
            event.preventDefault();

            // Captura dos inputs
            const km = parseFloat(document.getElementById('distancia').value) || 0;
            
            const precoGas = parseFloat(document.getElementById('precoGasolina').value) || 0;
            const litrosGas = parseFloat(document.getElementById('litrosGasolina').value) || 0;
            
            const precoEta = parseFloat(document.getElementById('precoEtanol').value) || 0;
            const litrosEta = parseFloat(document.getElementById('litrosEtanol').value) || 0;

            // Validação básica
            if (litrosGas === 0 && litrosEta === 0) {
                alert("Por favor, insira a quantidade de pelo menos um dos combustíveis.");
                return;
            }

            // Cálculos financeiros e de volume
            const custoGas = precoGas * litrosGas;
            const custoEta = precoEta * litrosEta;
            const gastoTotal = custoGas + custoEta;
            const totalLitros = litrosGas + litrosEta;

            // Cálculos de desempenho (km/L)
            const consumoMedio = totalLitros > 0 ? km / totalLitros : 0;
            const custoPorKm = km > 0 ? gastoTotal / km : 0;

            // Cálculo das porcentagens da mistura
            const pctGas = totalLitros > 0 ? (litrosGas / totalLitros) * 100 : 0;
            const pctEta = totalLitros > 0 ? (litrosEta / totalLitros) * 100 : 0;

            // Atualização da interface (UI)
            document.getElementById('resGastoTotal').innerText = `R$ ${gastoTotal.toFixed(2).replace('.', ',')}`;
            document.getElementById('resConsumo').innerText = `${consumoMedio.toFixed(2).replace('.', ',')} km/L`;
            document.getElementById('resCustoKm').innerText = `R$ ${custoPorKm.toFixed(2).replace('.', ',')} / km`;
            document.getElementById('resTotalLitros').innerText = `${totalLitros.toFixed(2).replace('.', ',')} L`;

            // Atualizar as barras de proporção
            document.getElementById('barraGasolina').style.width = `${pctGas}%`;
            document.getElementById('barraEtanol').style.width = `${pctEta}%`;
            document.getElementById('pctGasolina').innerText = `Gasolina: ${pctGas.toFixed(0)}%`;
            document.getElementById('pctEtanol').innerText = `Etanol: ${pctEta.toFixed(0)}%`;

            // Exibir a div de resultados
            document.getElementById('resultados').classList.remove('hidden');
        }
    </script>
</body>
</html>
